<script>
    // cryptography
    function getKeyMaterial(password) {
        const enc = new TextEncoder();
        return window.crypto.subtle.importKey(
            "raw",
            enc.encode(password),
            "PBKDF2",
            false,
            ["deriveBits", "deriveKey"]
        );
    }

    async function encrypt(plaintext, password) {
        const salt = crypto.getRandomValues(new Uint8Array(16));
        const iv = crypto.getRandomValues(new Uint8Array(12));

        const keyMaterial = await getKeyMaterial(password);
        const key = await window.crypto.subtle.deriveKey(
            {
                name: "PBKDF2",
                salt,
                iterations: 100000,
                hash: "SHA-256",
            },
            keyMaterial,
            { name: "AES-GCM", length: 256 },
            true,
            ["encrypt", "decrypt"],
        );

        const ciphertext = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, plaintext);

        return {
            ciphertext,
            salt,
            iv
        };
    }

    async function decrypt(ciphertext, salt, iv, password) {
        const keyMaterial = await getKeyMaterial(password);
        const key = await window.crypto.subtle.deriveKey(
            {
                name: "PBKDF2",
                salt,
                iterations: 100000,
                hash: "SHA-256",
            },
            keyMaterial,
            { name: "AES-GCM", length: 256 },
            true,
            ["encrypt", "decrypt"],
        );

        return window.crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ciphertext);
    }

    // main
    const accessBtn = document.getElementById("accessBtn");
    const passwordInput = document.getElementById("password");
    const text = document.getElementById("text");
    const passwordList = document.getElementById("passwordList");
    const newPasswordContainer = document.getElementById("newPasswordContainer");

    accessBtn.addEventListener("click", async function (e) {
        text.innerHTML = "Decrypting...";

        if (passwordInput.value) {
            if (dictionary != null) {
                try {
                encryption = JSON.parse(
                    document.cookie.split(";").map(c => c.trim()).find(c => c.startsWith("passwords="))?.split("=")[1]
                ); // a sin against humanity

                ciphertext = encryption["cipher"];
                salt = encryption["salt"];
                iv = encryption["iv"];
                passwords = await decrypt(
                    ciphertext,
                    salt,
                    iv,
                    passwordInput
                );

                updatePasswordList();
                newPasswordContainer.hidden = false;
                } catch (e) {
                    if (e instanceof TypeError) {

                    }
                    text.innerHTML = "Failed to decrypt.";
                }
            };
        } else {
            text.innerHTML = "No password provided.";
        }

        setTimeout(() => { text.innerHTML = "" }, 1000);
    });

    encryption = JSON.parse(
        document.cookie.split(";").map(c => c.trim()).find(c => c.startsWith("passwords="))?.split("=")[1]
    ); // a sin against humanity
    document.cookie = `passwords=${JSON.stringify(encryption)}; SameSite=Strict; Secure; expires=Fri, 31 Dec 9999 23:59:59 GMT;`;

    const dictionary = encryption || null;

    function updatePasswordList() {
        passwordList.innerHTML = "";

        Object.entries(dictionary).forEach(([key, value]) => {
            const div = document.createElement("div");
            const label = document.createElement("label");
            const input = document.createElement("input");
            const button = document.createElement("button");

            label.innerHTML = `${key}: `;

            input.value = value;
            input.disabled = true;
            input.type = "password";

            button.innerHTML = "copy";

            button.addEventListener("click", async function (e) {
                navigator.clipboard.writeText(input.value);

                button.innerHTML = "copied";
                setTimeout(() => { button.innerHTML = "copy" }, 1000);
            });

            div.appendChild(label);
            div.appendChild(input);
            div.appendChild(button);

            passwordList.appendChild(div);
        });
    };

    const newPassword = document.getElementById("newPassword");
    const newPasswordName = document.getElementById("newPasswordName");
    const newPasswordPswd = document.getElementById("newPasswordPswd");

    newPassword.addEventListener("click", async function (e) {
        if (newPasswordPswd.value) {
            passwords[newPasswordName.value] = newPasswordPswd.value;
        } else {
            delete passwords[newPasswordName.value];
        }

        console.log(JSON.stringify(passwords));
        document.cookie = `passwords=${JSON.stringify(passwords)}; SameSite=Strict; Secure; expires=Fri, 31 Dec 9999 23:59:59 GMT;`;
        updatePasswordList();
    });
</script>
