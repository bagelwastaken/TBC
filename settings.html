<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <data id="titleName" value="SETTINGS"></data>

    <link rel="icon" href="./favicon.ico">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <h1>
        Settings
    </h1>

    <fieldset>
        <legend>CONFIG</legend>

        <div>
            <input type="checkbox" id="darkMode" name="darkMode" />
            <label for="darkMode">Dark Mode</label>
        </div>

        <div>
            <input type="checkbox" id="anonymous" name="anonymous" />
            <label for="anonymous">Anonymous Mode</label>
        </div>
    </fieldset>

    <br />

    <button onclick="history.back()">Back</button>
</body>

<script src="./script.js"></script>

<script>
    const anonymousToggle = document.getElementById("anonymous");
    const darkModeToggle = document.getElementById("darkMode");

    anonymousToggle.checked = (localStorage.getItem("anonymous") === "true");

    anonymousToggle.addEventListener("change", () => {
        localStorage.setItem("anonymous", anonymousToggle.checked);
    });

    darkModeToggle.checked = (localStorage.getItem("darkMode") === "true");

    darkModeToggle.addEventListener("change", () => {
        localStorage.setItem("darkMode", darkModeToggle.checked);
        if (localStorage.getItem("darkMode") === "true") {
            document.body.setAttribute("data-theme", "dark");
        } else {
            document.body.setAttribute("data-theme", "light");
        }
    });

</script>

</html>
